[build]
  command = "npm run build"
  publish = ".next"

[[plugins]]
  package = "@netlify/plugin-nextjs"

# Production: POST /api/submit-lead is handled by Next.js app/api/submit-lead/route.ts.
# Uncomment for netlify dev when testing the function directly:
# [[redirects]]
#   from = "/api/submit-lead"
#   to = "/.netlify/functions/submit-lead"
#   status = 200
#   force = true

[[headers]]
  for = "/sitemap.xml"
  [headers.values]
    Content-Type = "application/xml; charset=utf-8"

[[headers]]
  for = "/robots.txt"
  [headers.values]
    Content-Type = "text/plain; charset=utf-8"
